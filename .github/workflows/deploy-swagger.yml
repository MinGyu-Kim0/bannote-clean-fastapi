name: Generate Swagger and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.AWS_DB_HOST }}
      DB_USER: ${{ secrets.AWS_DB_USER }}
      DB_PASSWORD: ${{ secrets.AWS_DB_PASSWORD }}
      DB_NAME: ${{ secrets.AWS_DB_NAME }}
      DB_PORT: "3306"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Validate AWS DB secrets
        shell: bash
        run: |
          missing=()
          for key in DB_HOST DB_USER DB_PASSWORD DB_NAME; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets mapped to workflow env: ${missing[*]}" >&2
            echo "Please add AWS_DB_HOST, AWS_DB_USER, AWS_DB_PASSWORD, and AWS_DB_NAME." >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          from pathlib import Path

          raw = Path("requirements.txt").read_bytes()
          if raw.startswith((b"\xff\xfe", b"\xfe\xff")):
              text = raw.decode("utf-16")
          else:
              text = raw.decode("utf-8")

          lines = [line for line in text.splitlines() if " @ file:///" not in line]
          Path("requirements.ci.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"wrote {len(lines)} requirement lines")
          PY
          pip install -r requirements.ci.txt

      - name: Verify AWS DB connection
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pymysql

          connection = pymysql.connect(
              host=os.environ["DB_HOST"],
              user=os.environ["DB_USER"],
              password=os.environ["DB_PASSWORD"],
              database=os.environ["DB_NAME"],
              port=int(os.environ.get("DB_PORT") or 3306),
              charset="utf8mb4",
          )
          with connection.cursor() as cursor:
              cursor.execute("SELECT 1")
              print("AWS DB connection OK:", cursor.fetchone())
          connection.close()
          PY

      - name: Generate static Swagger UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          from main import app

          site_dir = Path("site")
          site_dir.mkdir(parents=True, exist_ok=True)

          schema = app.openapi()
          (site_dir / "openapi.json").write_text(
              json.dumps(schema, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          (site_dir / "index.html").write_text(
              """<!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Bannote API Docs</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
            <style>
              body { margin: 0; background: #fafafa; }
              .topbar { display: none; }
            </style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
            <script>
              SwaggerUIBundle({
                url: "./openapi.json",
                dom_id: "#swagger-ui",
                deepLinking: true,
                presets: [SwaggerUIBundle.presets.apis],
                layout: "BaseLayout"
              });
            </script>
          </body>
          </html>
          """,
              encoding="utf-8",
          )

          (site_dir / ".nojekyll").write_text("", encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
