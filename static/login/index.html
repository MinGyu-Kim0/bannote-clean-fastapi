<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 청소 관리 시스템</title>
  <link rel="stylesheet" href="/static/shared/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>청소 관리 시스템</h1>
      <p class="subtitle">학번과 비밀번호를 입력하세요</p>

      <div id="alert" class="alert" style="display:none"></div>

      <div class="form-group">
        <label for="studentId">학번</label>
        <input type="text" id="studentId" placeholder="학번 입력" autofocus>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력">
      </div>
      <button type="button" id="loginBtn" class="btn btn-primary btn-full">로그인</button>

      <div style="text-align:center; margin-top:16px;">
        <a href="/signup" class="back-link">처음 로그인하시나요? 비밀번호 설정</a>
      </div>
    </div>
  </div>

  <script src="/static/shared/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
