<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 설정 - 청소 관리 시스템</title>
  <link rel="stylesheet" href="/static/shared/styles.css">
  <link rel="stylesheet" href="/login/styles.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>청소 관리 시스템</h1>
      <p class="subtitle">최초 1회 비밀번호를 설정하세요</p>

      <div id="alert" class="alert" style="display:none"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="studentId">학번</label>
          <input type="text" id="studentId" placeholder="학번 입력" required autofocus>
        </div>
        <div class="form-group">
          <label for="newPassword">비밀번호</label>
          <input type="password" id="newPassword" placeholder="4자 이상" required minlength="4">
        </div>
        <div class="form-group">
          <label for="confirmPassword">비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="비밀번호 재입력" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary btn-full">비밀번호 설정</button>
      </form>

      <div style="text-align:center; margin-top:16px;">
        <a href="/login" class="back-link">← 로그인으로 돌아가기</a>
      </div>
    </div>
  </div>

  <script src="/static/shared/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
